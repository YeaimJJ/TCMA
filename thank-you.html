<!DOCTYPE html>
<html lang="en">
<head>

<title>Thank You — TCMA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Cinzel:wght@700;900&family=Lora:ital,wght@0,400;1,400&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
:root{--black:#0D0B08;--deep:#18140E;--gold:#D4A017;--gold-light:#F0C84A;--cream:#FAF4E4;--border:rgba(212,160,23,.24)}
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:radial-gradient(ellipse at 50% 25%,rgba(212,160,23,.13),transparent 55%),var(--black);color:var(--cream);font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;text-align:center;padding:1.5rem}main{max-width:720px;border:1px solid var(--border);background:rgba(255,255,255,.035);border-radius:10px;padding:3rem 2rem;box-shadow:0 24px 70px rgba(0,0,0,.45)}img{width:120px;max-width:45vw;margin-bottom:1.25rem;filter:drop-shadow(0 0 25px rgba(212,160,23,.28))}.eyebrow{font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem}h1{font-family:'Cinzel',serif;font-size:clamp(1.8rem,5vw,2.8rem);margin-bottom:.8rem;color:var(--gold)}p{font-family:'Lora',serif;font-style:italic;color:#cdb783;font-size:1.05rem;line-height:1.7;margin-bottom:1.4rem}.btn{display:inline-block;background:var(--gold);color:var(--black);text-decoration:none;text-transform:uppercase;font-weight:800;letter-spacing:.08em;border-radius:4px;padding:.85rem 1.6rem;margin-top:.5rem}.btn:hover{background:var(--gold-light)}.contact{font-family:'DM Sans',sans-serif;font-style:normal;font-size:.9rem;color:#8a7a5a;margin-top:1.5rem}.contact a{color:#c0a060;text-decoration:none}</style>
</head>
<body>
<main>
  <img src="tcma-logo.png" alt="TCMA Logo" />
  <div class="eyebrow">Registration Received</div>
  <h1>¡Gracias!</h1>
  <p>We received your TCMA registration. We’ll contact you soon to confirm your instrument, schedule, and start date.</p>
  <a class="btn" href="index.html">Back to TCMA Home</a>
  <div class="contact">Questions? Call or text <a href="tel:2108597122">210-859-7122</a> or email <a href="mailto:tcmaeducation@gmail.com">tcmaeducation@gmail.com</a>.</div>
</main>
</body>
</html>
